user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance Optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Strip version headers for security

    # Connection Keep-Alive Pooling for High-Frequency Agents
    upstream agenthub_api {
        server 127.0.0.1:4000;
        keepalive 32;
    }

    # Global Rate Limiting Zone (anti-DoS protection)
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=30r/s;

    server {
        listen 80;
        listen [::]:80;
        server_name agenthub.ai;

        # Enforce HTTPS redirect
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name agenthub.ai;

        # Strict SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Hardened Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Limit incoming payload buffer size
        client_max_body_size 5M;

        # Proxy location matching rules
        location /api/ {
            limit_req zone=ip_limit burst=50 nodelay;

            proxy_pass http://agenthub_api/;
            proxy_http_version 1.1;
            
            # Connection pooling headers
            proxy_set_header Connection "";
            
            # Request forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Proxy buffers sizing
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Frontend static files location (or proxied to Vercel/Next.js)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
